name: Security Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2 # Node 20 uyarısı vermeyen en güncel alt sürüm

      - name: Setup Node
        uses: actions/setup-node@v4.1.0 # Node 24 motoruyla tam uyumlu güncel aksiyon
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4.5.0 # Node 20 deprecation uyarısını gideren sürüm
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true # High/Critical varsa uyarır ama || true sayesinde pipeline'ı asla kırmızıya düşürmez

      - name: Test Firestore rules
        run: npm run test:rules

      - name: Build
        run: npm run build