name: SKT Bildirim Gönder

permissions:
  contents: read

on:
  schedule:
    # Her gün 07:00 UTC (Türkiye 10:00)
    - cron: '0 7 * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  send-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu checkout et
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Bağımlılıkları kur
        run: npm install web-push --no-save

      - name: Bildirimleri gönder
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_SUBJECT: mailto:yusufkaramuk10@gmail.com
        run: node scripts/send-notifications.js
