name: TITCK İlaç Veritabanı Güncelle

on:
  schedule:
    # Her Pazartesi 03:00 UTC (Türkiye 06:00)
    - cron: '0 3 * * 1'
  workflow_dispatch: # Manuel tetikleme

jobs:
  update-medicines:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu checkout et
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: xlsx paketini kur
        run: npm install xlsx --no-save

      - name: TITCK verisini çek ve dönüştür
        run: node scripts/fetch-titck-data.js

      - name: Değişiklik var mı kontrol et
        id: check
        run: |
          if git diff --quiet public/medicines.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Değişiklikleri commit et
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/medicines.json
          git commit -m "chore: TITCK ilaç veritabanı güncellendi ($(date -u +%Y-%m-%d))"
          git push
